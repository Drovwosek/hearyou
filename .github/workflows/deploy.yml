name: Deploy to Production

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Hand off to VPS pull deploy
        run: |
          echo "Tests passed. Production deploy is pull-based on the Timeweb VPS."
          echo "The hearyou-pull-deploy.timer checks the latest successful Tests run on main and deploys that SHA."
