name: Deploy to Production

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail

          key_file="${RUNNER_TEMP}/vps_ssh_key"
          printf '%s\n' "${VPS_SSH_KEY}" > "${key_file}"
          chmod 600 "${key_file}"

          ssh_opts=(
            -i "${key_file}"
            -o StrictHostKeyChecking=accept-new
            -o KexAlgorithms=ecdh-sha2-nistp256
            -o HostKeyAlgorithms=ssh-ed25519
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=10
          )

          ssh "${ssh_opts[@]}" "${VPS_USER}@${VPS_HOST}" 'cat > /root/hearyou-deploy-run.sh' <<'REMOTE'
          set -euo pipefail
            
          echo "🚀 Starting deployment..."
            
          # Navigate to project
          cd /root/hearyou
            
          # Pull latest changes
          echo "📥 Pulling latest code..."
          git fetch origin main
          git reset --hard origin/main
            
          # Navigate to service directory
          cd packages/stt-service

          if docker compose version >/dev/null 2>&1; then
            COMPOSE="docker compose"
          else
            COMPOSE="docker-compose"
          fi
            
          # Rebuild Docker image
          echo "🏗️ Building Docker image..."
          $COMPOSE build
            
          # Restart service
          echo "🔄 Restarting service..."
          $COMPOSE down
          $COMPOSE up -d
            
          # Wait for service to start
          sleep 10
            
          # Check if service is running
          if docker ps | grep hearyou-stt > /dev/null; then
            echo "✅ Service deployed successfully!"
            docker logs hearyou-stt --tail 10
          else
            echo "❌ Service failed to start!"
            docker logs hearyou-stt --tail 50
            exit 1
          fi
          REMOTE

          ssh "${ssh_opts[@]}" "${VPS_USER}@${VPS_HOST}" 'chmod +x /root/hearyou-deploy-run.sh && rm -f /root/hearyou-deploy.exit /root/hearyou-deploy.log && nohup bash -c "/root/hearyou-deploy-run.sh > /root/hearyou-deploy.log 2>&1; echo \$? > /root/hearyou-deploy.exit" >/dev/null 2>&1 &'

          for attempt in {1..80}; do
            sleep 15
            echo "---- deploy log tail (attempt ${attempt}) ----"
            ssh "${ssh_opts[@]}" "${VPS_USER}@${VPS_HOST}" 'tail -n 80 /root/hearyou-deploy.log 2>/dev/null || true'
            status="$(ssh "${ssh_opts[@]}" "${VPS_USER}@${VPS_HOST}" 'if [ -f /root/hearyou-deploy.exit ]; then cat /root/hearyou-deploy.exit; else echo RUNNING; fi')"
            if [ "${status}" != "RUNNING" ]; then
              if [ "${status}" = "0" ]; then
                echo "Deploy completed successfully."
                exit 0
              fi
              echo "Deploy failed with exit code ${status}."
              exit "${status}"
            fi
          done

          echo "Deploy timed out."
          exit 1
