version: '3.8'

services:
  stt-service-test:
    build:
      context: ../..
      dockerfile: packages/stt-service/Dockerfile
    container_name: hearyou-stt-test
    ports:
      - "8001:8000"
    volumes:
      - ./uploads-test:/app/uploads
      - ./results-test:/app/results
      - ./static-test:/app/static:ro
      - ./temp-test:/app/temp
      - ./logs-test:/app/logs
    env_file:
      - .env.yandex
      - .env.huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=test
    restart: unless-stopped
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000", "--timeout-keep-alive", "900", "--h11-max-incomplete-event-size", "1073741824"]
